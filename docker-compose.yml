services:
  # gluetun fournit le tunnel Surfshark (OpenVPN) — l'auth se fait avec
  # ton OPENVPN_USER/OPENVPN_PASSWORD Surfshark, pas avec une keypair WG.
  # Tout container qui partage son netns (network_mode: "service:gluetun")
  # sort automatiquement par le tunnel.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: tss-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    environment:
      VPN_SERVICE_PROVIDER: surfshark
      VPN_TYPE: openvpn
      OPENVPN_USER: ${OPENVPN_USER}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
      # Defaults at boot — overridden at runtime via gluetun's control API.
      SERVER_COUNTRIES: ${SURFSHARK_COUNTRY:-France}
      # Expose gluetun's control HTTP API on loopback for our daemon.
      HTTP_CONTROL_SERVER_ADDRESS: 127.0.0.1:8000
      HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH: /gluetun/auth/config.toml
      TZ: Europe/Paris
    volumes:
      - ./data/gluetun:/gluetun
      - ./gluetun-auth:/gluetun/auth:ro
    # gluetun manages routes/iptables inside its own netns. We rely on its
    # health check (the VPN is up when /v1/openvpn/status reports running).
    networks:
      default: {}
      # Static IP on the egress bridge so tss-tailscale-front (on the host
      # netns) can policy-route exit-node traffic into gluetun's tun0 via a
      # fixed next-hop. Without a fixed IP the policy route would break every
      # time gluetun is recreated.
      tss-egress:
        ipv4_address: 172.30.0.2

  tailscale-surfshark:
    image: tailscale-surfshark:dev
    container_name: tailscale-surfshark
    build: .
    restart: unless-stopped
    # Share gluetun's network namespace: our UDP/TCP egresses through its
    # Surfshark tunnel automatically. No WG or iptables in this container.
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data:/data
      # mount the whole project dir RW so the daemon can edit .env and run
      # `docker compose up -d --force-recreate gluetun` to apply a new country
      - .:/workspace
      # docker socket lets us call `docker compose` from inside this container
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    environment:
      # docker compose needs the same project name as the host to find the
      # existing gluetun container; otherwise it tries to create a duplicate.
      COMPOSE_PROJECT_NAME: tailscale-surfshark
    env_file:
      - .env

  # Fast Tailscale exit-node: lives in the HOST netns (own UDP port 41642,
  # direct P2P possible if port is forwarded on the Free box). Its outbound
  # exit-node traffic is policy-routed via the tss-egress bridge into
  # gluetun's tun0 → Surfshark. Adds a SECOND tailnet device alongside the
  # slow one in gluetun netns; the slow one is left untouched so the
  # dashboard keeps working even if this fast path breaks.
  tss-tailscale-front:
    image: tailscale-surfshark:dev
    container_name: tss-tailscale-front
    build: .
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - gluetun
    volumes:
      - ./data/tailscale-front:/var/lib/tailscale
    environment:
      TS_AUTHKEY_FRONT: ${TS_AUTHKEY_FRONT}
      TS_HOSTNAME_FRONT: ${TS_HOSTNAME_FRONT:-synology-surfshark-exit}
      TS_PORT_FRONT: ${TS_PORT_FRONT:-41642}
      TS_TUN_NAME: ${TS_TUN_NAME:-tailscale1}
      GLUETUN_BRIDGE_IP: 172.30.0.2
    entrypoint: ["/entrypoint-front.sh"]

networks:
  tss-egress:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
