services:
  tailscale-surfshark:
    image: tailscale-surfshark:dev
    container_name: tailscale-surfshark
    build: .
    restart: unless-stopped
    # host networking is required: with bridge networking, Synology DSM's
    # UDP conntrack drops Surfshark's reply packets back through the Docker
    # NAT, so wg0 handshakes but no data flows. In host mode wireguard-go
    # binds directly on the Synology's interface and Surfshark talks to it
    # without any intermediate NAT. Tailscale's `--tun=userspace-networking`
    # ensures we don't clash with any existing host-side `tailscale0`.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data:/data
    env_file:
      - .env
