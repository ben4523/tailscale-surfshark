<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#050b18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Surfshark" />
  <title>Surfshark Exit</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand" title="Green dot = realtime events stream alive">
        <span class="dot" id="connDot"></span>
        <span>Surfshark Exit</span>
      </div>
      <button class="iconbtn" id="logsBtn" aria-label="Logs">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      </button>
    </header>

    <section class="hero">
      <div class="hero-flag" id="heroFlag">·</div>
      <div class="hero-state" id="heroState">Loading…</div>
      <div class="hero-location" id="heroLocation"></div>
      <div class="hero-ip" id="heroIp"></div>
    </section>

    <section id="banners"></section>

    <div class="grid">
      <button class="card power" id="powerCard">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/></svg>
        </div>
        <div class="card-label">VPN</div>
        <div class="card-value" id="powerLabel">—</div>
      </button>

      <button class="card location" id="locationCard">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="card-label">Location</div>
        <div class="card-value">Change</div>
      </button>
    </div>

    <section class="ksbar">
      <div class="ksbar-text">
        <div class="ksbar-title">Kill Switch</div>
        <div class="ksbar-sub" id="ksSub">Block traffic when VPN is off</div>
      </div>
      <button class="switch" id="ksSwitch" role="switch" aria-checked="false" aria-label="Kill switch"></button>
    </section>

    <section class="card info">
      <h2>Details</h2>
      <div class="kv" id="details"></div>
    </section>
  </main>

  <!-- Bottom sheet: location picker -->
  <div class="sheet" id="locSheet" aria-hidden="true">
    <div class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h3>Select location</h3>
        <button class="iconbtn" id="closeLoc" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <input class="search" id="locSearch" placeholder="Search country or city…" autocomplete="off" />
      <ul class="loclist" id="locList"></ul>
    </div>
  </div>

  <!-- Bottom sheet: logs -->
  <div class="sheet" id="logsSheet" aria-hidden="true">
    <div class="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h3>Live events</h3>
        <button class="iconbtn" id="closeLogs" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <pre id="log"></pre>
    </div>
  </div>

  <!-- Switching overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay-content">
      <div class="spinner"></div>
      <div id="overlayText">Switching…</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
